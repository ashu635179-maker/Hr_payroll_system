kind = "web"
previewPath = "/"
title = "HR & Payroll Management System"
version = "1.0.0"
id = "artifacts/hr-payroll"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20007

[services.development]
run = "pnpm --filter @workspace/hr-payroll run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hr-payroll", "run", "build" ]
publicDir = "artifacts/hr-payroll/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20007"
BASE_PATH = "/"
